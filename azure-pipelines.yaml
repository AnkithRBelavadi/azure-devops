trigger:
- main

pool:
  name: 'Default'

jobs:
- job: BuildAndDeploy
  displayName: 'Deploy FastAPI App'
  steps:
  - checkout: self

  - script: |
        # Force a clean start for the virtual environment
        rm -rf venv
        python3 -m venv venv
        ./venv/bin/pip install -r requirements.txt
    displayName: 'Install Dependencies'

  - script: |
      echo "Stopping old app"
      pkill -f uvicorn || true
    displayName: 'Stop Old App'

  - script: |
      echo "Deploying FastAPI"
      cd $(Build.SourcesDirectory)

      echo "Stopping old server"
      pkill -f uvicorn || true

      echo "Starting server"
      nohup ./venv/bin/uvicorn app:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
    displayName: Deploy FastAPI